{
  "name": "createCollectivite",
  "description": "Ouvre une nouvelle collectivité agricole après vérification des conditions réglementaires (10 membres minimum avec 6 mois d'ancienneté, postes spécifiques occupés, autorisation fédérale). Retourne les détails de la collectivité créée ou une erreur.",
  "parameters": {
    "type": "object",
    "properties": {
      "nom": {
        "type": "string",
        "description": "Nom unique de la collectivité."
      },
      "specialite": {
        "type": "string",
        "description": "Spécialité agricole exercée (ex: 'élevage bovin', 'maraîchage')."
      },
      "ville": {
        "type": "string",
        "description": "Localité (ville) où la collectivité est implantée."
      },
      "dateCreation": {
        "type": "string",
        "format": "date",
        "description": "Date de création (format YYYY-MM-DD)."
      },
      "autorisationFederation": {
        "type": "string",
        "description": "Preuve d'autorisation formelle délivrée par la fédération (ex: numéro d'arrêté)."
      },
      "membresFondateurs": {
        "type": "array",
        "description": "Liste des membres initiaux (au moins 10). Chaque membre doit avoir une ancienneté ≥6 mois dans la fédération et un poste spécifique (président, adjoint, trésorier, secrétaire, confirmé, junior).",
        "items": {
          "type": "object",
          "properties": {
            "membreId": { "type": "integer" },
            "poste": {
              "type": "string",
              "enum": ["president", "adjoint", "tresorier", "secretaire", "confirme", "junior"]
            }
          },
          "required": ["membreId", "poste"]
        }
      }
    },
    "required": ["nom", "specialite", "ville", "dateCreation", "autorisationFederation", "membresFondateurs"],
    "additionalProperties": false
  }
}

  {
    "name": "adhererCollectivite",
    "description": "Admet un nouveau membre dans une collectivité agricole après vérification du parrainage (membre confirmé avec ancienneté >90 jours) et du paiement des frais d'adhésion (50 000 MGA). Retourne un identifiant membre et la date d'adhésion.",
    "parameters": {
      "type": "object",
      "properties": {
        "collectiviteId": {
          "type": "integer",
          "description": "Identifiant de la collectivité cible."
        },
        "parrainId": {
          "type": "integer",
          "description": "Identifiant d’un membre confirmé dont l’ancienneté dépasse 90 jours."
        },
        "nom": { "type": "string" },
        "prenom": { "type": "string" },
        "dateNaissance": { "type": "string", "format": "date" },
        "genre": { "type": "string", "enum": ["feminin", "masculin"] },
        "adresse": { "type": "string" },
        "metier": { "type": "string" },
        "telephone": { "type": "string" },
        "email": { "type": "string", "format": "email" },
        "modePaiementAdhesion": {
          "type": "string",
          "enum": ["mobile_money", "virement_bancaire"],
          "description": "Moyen de paiement des 50 000 MGA."
        },
        "referencePaiement": {
          "type": "string",
          "description": "Référence du paiement (transaction mobile money ou virement)."
        }
      },
      "required": ["collectiviteId", "parrainId", "nom", "prenom", "dateNaissance", "genre", "adresse", "metier", "telephone", "email", "modePaiementAdhesion", "referencePaiement"],
      "additionalProperties": false
    }
  }

  {
    "name": "enregistrerCotisation",
    "description": "Le trésorier enregistre un versement de cotisation effectué par un membre. Les cotisations périodiques (mensuelles ou annuelles) déclenchent automatiquement le calcul du pourcentage à reverser à la fédération.",
    "parameters": {
      "type": "object",
      "properties": {
        "collectiviteId": { "type": "integer" },
        "membreId": { "type": "integer" },
        "montant": { "type": "number", "description": "Montant en MGA." },
        "typeCotisation": {
          "type": "string",
          "enum": [ "mensuelle", "annuelle", "ponctuelle" ],
          "description": "Périodicité ou caractère exceptionnel."
        },
        "dateEncaissement": { "type": "string", "format": "date" },
        "modePaiement": {
          "type": "string",
          "enum": [ "espece", "virement_bancaire", "mobile_money" ]
        },
        "referencePaiement": {
          "type": "string",
          "description": "Référence de transaction pour virement ou mobile money (optionnel si espèce)."
        }
      },
      "required": [ "collectiviteId", "membreId", "montant", "typeCotisation", "dateEncaissement", "modePaiement" ],
      "additionalProperties": false
    }
  }

  {
    "name": "creerCompte",
    "description": "Ajoute un nouveau compte (caisse, bancaire ou mobile money) pour une collectivité ou la fédération. Une collectivité ne peut avoir qu'une seule caisse.",
    "parameters": {
      "type": "object",
      "properties": {
        "entiteType": {
          "type": "string",
          "enum": ["collectivite", "federation"],
          "description": "Entité propriétaire du compte."
        },
        "entiteId": {
          "type": "integer",
          "description": "Identifiant de la collectivité (si entiteType='collectivite') ou null pour la fédération."
        },
        "typeCompte": {
          "type": "string",
          "enum": ["caisse", "bancaire", "mobile_money"]
        },
        "titulaire": { "type": "string", "description": "Nom du titulaire du compte." },
        "soldeInitial": { "type": "number", "default": 0 },
        "details": {
          "type": "object",
          "description": "Informations spécifiques selon le type de compte.",
          "oneOf": [
            {
              "properties": {
                "banque": { "type": "string", "enum": ["BRED", "MCB", "BMOI", "BOA", "BGFI", "AFG", "ACCES BANQUE", "BAOBAB", "SIPEM"] },
                "numeroCompte": { "type": "string", "pattern": "^\\d{23}$", "description": "23 chiffres selon le format RIB." }
              },
              "required": ["banque", "numeroCompte"]
            },
            {
              "properties": {
                "serviceMobile": { "type": "string", "enum": ["Orange Money", "Mvola", "Airtel Money"] },
                "numeroTelephone": { "type": "string" }
              },
              "required": ["serviceMobile", "numeroTelephone"]
            }
          ]
        }
      },
      "required": ["entiteType", "typeCompte", "titulaire"],
      "additionalProperties": false
    }
  }

  {
    "name": "getSituationTresorerie",
    "description": "Retourne la liste de tous les comptes d’une entité (collectivité ou fédération) avec leur solde à une date donnée.",
    "parameters": {
      "type": "object",
      "properties": {
        "entiteType": { "type": "string", "enum": [ "collectivite", "federation" ] },
        "entiteId": { "type": "integer" },
        "date": { "type": "string", "format": "date", "description": "Date à laquelle on souhaite connaître les soldes (optionnel, par défaut aujourd'hui)." }
      },
      "required": [ "entiteType", "entiteId" ],
      "additionalProperties": false
    }
  }

  {
    "name": "planifierActivite",
    "description": "Crée une activité (assemblée mensuelle, formation, événement exceptionnel) pour une collectivité ou la fédération. Les activités obligatoires sont déjà prédéfinies dans le calendrier (ex: 2ème dimanche du mois) ; cette fonction sert surtout aux activités exceptionnelles.",
    "parameters": {
      "type": "object",
      "properties": {
        "organisateurType": {
          "type": "string",
          "enum": [ "collectivite", "federation" ]
        },
        "organisateurId": {
          "type": "integer",
          "description": "Identifiant de la collectivité (si organisateurType='collectivite') ou null pour la fédération."
        },
        "titre": { "type": "string" },
        "description": { "type": "string" },
        "dateHeure": { "type": "string", "format": "date-time" },
        "obligatoire": { "type": "boolean", "description": "Si true, la présence est requise pour les membres concernés." },
        "membresConcernes": {
          "type": "object",
          "description": "Précise qui doit participer.",
          "properties": {
            "tous": { "type": "boolean", "description": "Si true, tous les membres de l’entité." },
            "roles": {
              "type": "array",
              "items": { "type": "string", "enum": [ "president", "adjoint", "tresorier", "secretaire", "confirme", "junior" ] },
              "description": "Liste des rôles concernés (si tous=false)."
            },
            "membresSpecifiques": {
              "type": "array",
              "items": { "type": "integer" },
              "description": "Liste d’identifiants membres (si besoin d’un sous-ensemble précis)."
            }
          }
        }
      },
      "required": [ "organisateurType", "titre", "dateHeure", "obligatoire" ],
      "additionalProperties": false
    }
  }

  {
    "name": "enregistrerPresence",
    "description": "Le secrétaire note la présence d’un membre à une activité. Un membre peut être excusé s’il a prévenu au préalable. Les membres d’autres collectivités peuvent être enregistrés comme invités (leur présence n’affecte pas leur taux personnel).",
    "parameters": {
      "type": "object",
      "properties": {
        "activiteId": { "type": "integer" },
        "membreId": { "type": "integer" },
        "present": { "type": "boolean" },
        "excusé": {
          "type": "boolean",
          "description": "True si le membre a justifié son absence (un motif doit être fourni)."
        },
        "motifAbsence": {
          "type": "string",
          "description": "Obligatoire si excusé=true."
        },
        "estInvité": {
          "type": "boolean",
          "default": false,
          "description": "True si le membre appartient à une autre collectivité que celle organisatrice."
        }
      },
      "required": [ "activiteId", "membreId", "present" ],
      "additionalProperties": false
    }
  }

  {
    "name": "getTauxAssiduite",
    "description": "Calcule le taux d’assiduité d’un membre sur une période donnée (nombre de présences / nombre d’activités obligatoires pour ce membre). Seules les activités obligatoires (y compris les exceptions où il était concerné) sont prises en compte. Les absences excusées ne pénalisent pas.",
    "parameters": {
      "type": "object",
      "properties": {
        "membreId": { "type": "integer" },
        "dateDebut": { "type": "string", "format": "date" },
        "dateFin": { "type": "string", "format": "date" }
      },
      "required": [ "membreId", "dateDebut", "dateFin" ],
      "additionalProperties": false
    }
  }

  {
    "name": "getStatistiquesCollectivite",
    "description": "Génère les statistiques demandées par le président pour une collectivité sur une période donnée : taux d’assiduité global, nombre de membres actifs, et pour chaque membre son taux d’assiduité, le total encaissé et le total impayé (cotisations dues non réglées).",
    "parameters": {
      "type": "object",
      "properties": {
        "collectiviteId": { "type": "integer" },
        "dateDebut": { "type": "string", "format": "date" },
        "dateFin": { "type": "string", "format": "date" }
      },
      "required": [ "collectiviteId", "dateDebut", "dateFin" ],
      "additionalProperties": false
    }
  }